# Production overrides для домена withmouse.tirskix.space
# Использование: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# ВАЖНО: на сервере уже работает Caddy (learning-portal-web-1) на портах 80/443.
# Наши контейнеры подключаются к его сети — nginx и certbot НЕ нужны.

services:
  backend:
    env_file:
      - ./backend/.env
    ports: []
    expose:
      - "8000"
    networks:
      - default
      - caddy_net

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: https://withmouse.tirskix.space/api
        NEXT_PUBLIC_UPLOAD_URL: https://withmouse.tirskix.space
    ports: []
    expose:
      - "3000"
    networks:
      - default
      - caddy_net

  db:
    # Пароль берём из backend/.env (POSTGRES_PASSWORD)
    env_file:
      - ./backend/.env
    networks:
      - default

networks:
  default: {}
  caddy_net:
    external: true
    name: ${CADDY_NETWORK}
