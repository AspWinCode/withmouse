# Production overrides для домена withmouse.tirskix.space
# Использование: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    # Все переменные берём из backend/.env — не нужно дублировать здесь
    env_file:
      - ./backend/.env

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: https://withmouse.tirskix.space/api
        NEXT_PUBLIC_UPLOAD_URL: https://withmouse.tirskix.space

  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/uploads:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"

  certbot:
    image: certbot/certbot:latest
    container_name: mouse_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  certbot_www:
  certbot_certs:
