# Production overrides for withmouse.tirskix.space
# Uses Caddy (learning-portal-web-1) already running on server for SSL/proxy.
#
# Project-level .env (written by deploy.sh) must contain:
#   CADDY_NETWORK      - Docker network name of the Caddy container
#   POSTGRES_PASSWORD  - DB password (random, generated on first deploy)
#   DATABASE_URL       - full postgres connection string with the same password
#   SECRET_KEY         - JWT signing key (random, generated on first deploy)

services:
  db:
    # Override the hardcoded local-dev password with the production secret.
    # environment: takes precedence over env_file, so we set it here explicitly.
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  backend:
    # Override ALL secrets from base compose with production values from project .env.
    # Using environment: (not env_file) for unambiguous precedence — no merge surprises.
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: '["https://withmouse.tirskix.space"]'
    networks:
      - default
      - caddy_net

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: https://withmouse.tirskix.space/api
        NEXT_PUBLIC_UPLOAD_URL: https://withmouse.tirskix.space
    networks:
      - default
      - caddy_net

networks:
  default: {}
  caddy_net:
    external: true
    name: ${CADDY_NETWORK}
