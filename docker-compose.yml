services:
  # -- PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: mouse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mouse_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -- FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mouse_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres_password@db:5432/mouse_db
      SECRET_KEY: dev-secret-key-not-for-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      UPLOAD_DIR: /uploads
      MAX_FILE_SIZE_MB: 50
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
    volumes:
      - uploads_data:/uploads
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # -- Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
        NEXT_PUBLIC_UPLOAD_URL: http://localhost:8000
    container_name: mouse_frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

volumes:
  postgres_data:
  uploads_data:
